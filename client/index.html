<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>SavvyOS</title>
    <link rel="icon" type="image/png" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663374872019/RGtcxHR8RPxZsqyxZLCcuq/favicon-savvyos-3czsaWMmY8Gq3r8hFVmhLB.png" />
    <link rel="apple-touch-icon" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663374872019/RGtcxHR8RPxZsqyxZLCcuq/favicon-savvyos-3czsaWMmY8Gq3r8hFVmhLB.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Self-heal stale deploys: if the app's module bundle fails to load
      // (its content-hash no longer exists after a deploy), the page would
      // otherwise render blank. Force one fresh reload to pull current HTML+JS.
      (function () {
        window.addEventListener(
          "error",
          function (e) {
            var t = e && e.target;
            if (
              t &&
              t.tagName === "SCRIPT" &&
              t.src &&
              t.src.indexOf("/assets/") !== -1
            ) {
              if (!sessionStorage.getItem("savvyos_reloaded_stale")) {
                sessionStorage.setItem("savvyos_reloaded_stale", "1");
                location.reload();
              }
            }
          },
          true
        );
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
